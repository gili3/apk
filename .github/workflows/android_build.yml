name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ✅ إصلاح: يشتغل على أي pull_request للتحقق من نجاح البناء فقط — بدون توقيع
  # وبدون أي وصول لأسرار الـkeystore. هذا الـjob لا يستخدم secrets إطلاقاً.
  build-debug-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug (unsigned, no secrets) — للتحقق من نجاح الكومبايل فقط
      run: ./gradlew assembleDebug

  # ✅ إصلاح: بناء الـrelease الموقّع (وفك تشفير الـkeystore) يعمل فقط عند push
  # لفرع main/master فعلياً (بعد المراجعة والدمج)، أو تشغيل يدوي — وليس عند أي
  # pull_request. سابقاً كان توقيع الـrelease يحدث على كل PR حتى من فروع داخل
  # نفس المستودع، مما يوسّع مساحة الخطر: أي فرع PR يقدر (نظرياً، عبر تعديل
  # build.gradle) يشغّل كود أثناء وصول أسرار التوقيع إليه. تقييد الـtrigger هنا
  # يجعل توقيع الإصدار الفعلي يحدث فقط على الكود المُراجَع والمدموج فعلياً.
  build-signed-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ✅ فك تشفير الـ keystore من GitHub Secret (base64) بدل رفعه كملف في المستودع.
    # أضف هذه الأسرار في Settings → Secrets and variables → Actions:
    #   RELEASE_KEYSTORE_BASE64  (ناتج: base64 -w0 release-keystore.jks)
    #   RELEASE_STORE_PASSWORD
    #   RELEASE_KEY_ALIAS
    #   RELEASE_KEY_PASSWORD
    #
    # ⚠️ يُكتب الملف داخل app/ عمداً (وليس جذر المستودع): storeFile في build.gradle
    # يُفسَّر بالنسبة لمجلد الوحدة app/ عند تمرير مسار نسبي بسيط عبر RELEASE_STORE_FILE
    # أدناه — كتابته بمكان آخر تسبب سابقاً "Keystore file ... not found" رغم صحة الأسرار.
    - name: Decode release keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks

    - name: Build with Gradle
      env:
        RELEASE_STORE_FILE: release-keystore.jks
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew assembleRelease bundleRelease

    - name: Remove decoded keystore
      if: always()
      run: rm -f app/release-keystore.jks

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: app/build/outputs/bundle/release/*.aab